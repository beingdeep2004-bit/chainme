<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChainMe — Crypto Symbol Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      overflow: hidden;
      position: relative;
    }

    /* Background */
    .bg-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f0f 100%);
      z-index: 0;
    }

    /* Floating symbols */
    .floating-symbols {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .floating-symbol {
      position: absolute;
      opacity: 0;
      filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.1));
    }

    @keyframes burst {
      0% {
        transform: translate(0, 0) scale(0);
        opacity: 0.5;
      }
      100% {
        transform: translate(var(--tx), var(--ty)) scale(1);
        opacity: 0.08;
      }
    }

    .floating-symbol.burst-animation {
      animation: burst 1.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-30px); }
    }

    .floating-symbol.floating {
      animation: float 7s ease-in-out infinite;
      opacity: 0.05;
    }

    /* Main panel */
    .container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      width: 100%;
      max-width: 520px;
      padding: 20px;
    }

    .panel {
      background: rgba(30, 30, 30, 0.6);
      backdrop-filter: blur(50px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      padding: 60px 45px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      opacity: 0;
      animation: fadeInPanel 0.8s ease-out 1.6s forwards;
    }

    @keyframes fadeInPanel {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .panel h1 {
      font-size: 2.4em;
      font-weight: 700;
      text-align: center;
      margin-bottom: 12px;
      color: #ffffff;
      letter-spacing: -0.8px;
    }

    .panel .tagline {
      text-align: center;
      color: #999;
      font-size: 0.95em;
      margin-bottom: 28px;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .input-group {
      display: flex;
      gap: 14px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: #ffffff;
      font-family: inherit;
      font-size: 0.95em;
      transition: all 0.3s ease;
      outline: none;
    }

    input[type="text"]:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
    }

    input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.4px;
    }

    .btn-generate {
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      min-width: 140px;
    }

    .btn-generate:hover {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(255, 255, 255, 0.25);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.12);
      width: 100%;
      margin-top: 12px;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.16);
    }

    /* Cards container */
    .cards-container {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
      min-height: 140px;
      align-items: center;
    }

    .card {
      width: 80px;
      height: 110px;
      perspective: 1000px;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
    }

    .card-front {
      background: #1a1a1a;
      border: 2px solid rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .card-front::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      animation: shimmer 2.5s infinite;
    }

    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .card-back {
      transform: rotateY(180deg);
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .card-logo {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5em;
    }

    /* Download section */
    .download-section {
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.6s ease-out forwards;
    }

    .btn-download {
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin-bottom: 14px;
    }

    .btn-download:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    .share-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .share-buttons .btn-secondary {
      margin: 0;
      width: auto;
      min-width: 110px;
      font-size: 0.9em;
      padding: 10px 16px;
    }

    /* Confetti */
    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 5;
      border-radius: 50%;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 768px) {
      .panel {
        padding: 40px 30px;
      }

      .panel h1 {
        font-size: 1.8em;
      }

      .card {
        width: 65px;
        height: 95px;
      }

      .card-logo {
        font-size: 2em;
      }
    }

    @media (max-width: 480px) {
      .panel {
        padding: 30px 20px;
      }

      .panel h1 {
        font-size: 1.5em;
      }

      .card {
        width: 55px;
        height: 85px;
      }

      .card-logo {
        font-size: 1.6em;
      }

      .input-group {
        flex-direction: column;
      }

      .btn-generate {
        width: 100%;
        min-width: unset;
      }
    }
  </style>
</head>
<body>
  <div class="bg-container"></div>
  <div class="floating-symbols"></div>

  <div class="container">
    <div class="panel">
      <h1>ChainMe</h1>
      <div class="tagline">Generate Crypto Symbol Chains</div>

      <div class="input-group">
        <input type="text" id="nameInput" placeholder="Enter name..." autocomplete="off">
        <button class="btn btn-generate" id="generateBtn">Generate</button>
      </div>

      <div class="cards-container" id="cardsContainer"></div>

      <div class="download-section" id="downloadSection">
        <button class="btn btn-secondary btn-download" id="downloadBtn">
          ⬇ Download Image
        </button>
        <div class="share-buttons">
          <button class="btn btn-secondary" id="shareTwitterBtn">Share</button>
          <button class="btn btn-secondary" id="shareCopyBtn">Copy</button>
          <button class="btn btn-secondary" id="regenerateBtn">Reset</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Crypto alphabet mapping with official symbols and colors
    const CRYPTO_MAP = {
      'A': { name: 'Cardano', symbol: '🔷', color: '#0033AD' },
      'B': { name: 'Bitcoin', symbol: '₿', color: '#F7931A' },
      'C': { name: 'Cronos', symbol: '🔵', color: '#002D74' },
      'D': { name: 'Dogecoin', symbol: 'Ð', color: '#C2A633' },
      'E': { name: 'Ethereum', symbol: 'Ξ', color: '#627EEA' },
      'F': { name: 'Filecoin', symbol: '⨎', color: '#0090FF' },
      'G': { name: 'The Graph', symbol: '📊', color: '#6F4CBA' },
      'H': { name: 'Hedera', symbol: 'ℏ', color: '#00B388' },
      'I': { name: 'Internet Computer', symbol: '∞', color: '#29ABE2' },
      'J': { name: 'Jupiter', symbol: '🪐', color: '#C4884C' },
      'K': { name: 'Kaspa', symbol: '⬡', color: '#49EACB' },
      'L': { name: 'Litecoin', symbol: 'Ł', color: '#BFBBBB' },
      'M': { name: 'MakerDAO', symbol: '◈', color: '#1AAB9B' },
      'N': { name: 'NEO', symbol: '🌿', color: '#58BF00' },
      'O': { name: 'Optimism', symbol: '🔴', color: '#FF0420' },
      'P': { name: 'Polygon', symbol: '⬟', color: '#8247E5' },
      'Q': { name: 'Qtum', symbol: '◉', color: '#2895D8' },
      'R': { name: 'Render', symbol: '🎨', color: '#FF4500' },
      'S': { name: 'Solana', symbol: '◎', color: '#9945FF' },
      'T': { name: 'TRON', symbol: '♦', color: '#FF0013' },
      'U': { name: 'Uniswap', symbol: '🦄', color: '#FF007A' },
      'V': { name: 'VeChain', symbol: '✦', color: '#15BDFF' },
      'W': { name: 'Worldcoin', symbol: '🌍', color: '#888888' },
      'X': { name: 'Ripple', symbol: '✕', color: '#00AAE4' },
      'Y': { name: 'Yearn Finance', symbol: '💙', color: '#006AE3' },
      'Z': { name: 'Zcash', symbol: 'ⓩ', color: '#F4B728' }
    };

    // Initialize floating symbols
    function initializeFloatingSymbols() {
      const container = document.querySelector('.floating-symbols');
      const symbols = Object.keys(CRYPTO_MAP);
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;

      symbols.forEach((letter, index) => {
        const crypto = CRYPTO_MAP[letter];
        const symbol = document.createElement('div');
        symbol.className = 'floating-symbol burst-animation';
        symbol.textContent = crypto.symbol;

        const size = 70 + Math.random() * 50;
        symbol.style.fontSize = size + 'px';
        symbol.style.left = centerX + 'px';
        symbol.style.top = centerY + 'px';
        symbol.style.color = crypto.color;
        symbol.style.display = 'flex';
        symbol.style.alignItems = 'center';
        symbol.style.justifyContent = 'center';
        symbol.style.width = size + 'px';
        symbol.style.height = size + 'px';

        const angle = (index / symbols.length) * Math.PI * 2;
        const distance = 280 + Math.random() * 400;
        const tx = Math.cos(angle) * distance + (Math.random() - 0.5) * 200;
        const ty = Math.sin(angle) * distance + (Math.random() - 0.5) * 200;

        symbol.style.setProperty('--tx', tx + 'px');
        symbol.style.setProperty('--ty', ty + 'px');

        const delay = Math.random() * 2;
        symbol.style.animationDelay = delay + 's';

        container.appendChild(symbol);

        setTimeout(() => {
          symbol.classList.remove('burst-animation');
          symbol.classList.add('floating');
          symbol.style.animationDelay = delay + 's';
        }, 1600);
      });
    }

    // Play tick sound
    function playTickSound() {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const now = audioContext.currentTime;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();

      osc.connect(gain);
      gain.connect(audioContext.destination);

      osc.frequency.setValueAtTime(650, now);
      osc.frequency.exponentialRampToValueAtTime(350, now + 0.12);

      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);

      osc.start(now);
      osc.stop(now + 0.12);
    }

    // Create and flip card
    function createAndFlipCard(letter, delayMs) {
      const crypto = CRYPTO_MAP[letter.toUpperCase()];
      if (!crypto) return;

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back">
            <div class="card-logo">${crypto.symbol}</div>
          </div>
        </div>
      `;

      document.getElementById('cardsContainer').appendChild(card);

      setTimeout(() => {
        card.classList.add('flipped');
        playTickSound();
      }, delayMs);

      return card;
    }

    // Create confetti
    function createConfetti() {
      const colors = Object.values(CRYPTO_MAP).map(c => c.color);
      const confettiCount = 30;

      for (let i = 0; i < confettiCount; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * window.innerWidth + 'px';
        confetti.style.top = '-10px';
        confetti.style.width = '10px';
        confetti.style.height = '10px';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];

        document.body.appendChild(confetti);

        const duration = 2.5 + Math.random() * 1;
        const animation = confetti.animate([
          { transform: 'translateY(0) rotateZ(0deg)', opacity: 1 },
          { transform: `translateY(${window.innerHeight + 20}px) rotateZ(${Math.random() * 360}deg)`, opacity: 0 }
        ], {
          duration: duration * 1000,
          easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
        });

        animation.onfinish = () => confetti.remove();
      }
    }

    // Download image
    function downloadImage(name) {
      const letters = name.toUpperCase().split('');
      const cardWidth = 120;
      const cardHeight = 160;
      const padding = 80;
      const canvasWidth = Math.max(1400, letters.length * cardWidth + padding * 2);
      const canvasHeight = 600;

      const canvas = document.createElement('canvas');
      canvas.width = canvasWidth;
      canvas.height = canvasHeight;
      const ctx = canvas.getContext('2d');

      // Gray/Black background
      const bgGradient = ctx.createLinearGradient(0, 0, canvasWidth, canvasHeight);
      bgGradient.addColorStop(0, '#0a0a0a');
      bgGradient.addColorStop(0.5, '#1a1a1a');
      bgGradient.addColorStop(1, '#0f0f0f');
      ctx.fillStyle = bgGradient;
      ctx.fillRect(0, 0, canvasWidth, canvasHeight);

      // Subtle grid
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
      ctx.lineWidth = 1;
      for (let i = 0; i < canvasWidth; i += 60) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvasHeight);
        ctx.stroke();
      }
      for (let i = 0; i < canvasHeight; i += 60) {
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(canvasWidth, i);
        ctx.stroke();
      }

      // Draw cards with symbols only
      const startX = (canvasWidth - letters.length * cardWidth) / 2;
      const startY = (canvasHeight - cardHeight) / 2;

      letters.forEach((letter, index) => {
        const crypto = CRYPTO_MAP[letter];
        if (!crypto) return;

        const x = startX + index * cardWidth;
        const y = startY;

        // Glass card background
        ctx.fillStyle = 'rgba(255, 255, 255, 0.06)';
        ctx.fillRect(x + 10, y + 10, cardWidth - 20, cardHeight);

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x + 10, y + 10, cardWidth - 20, cardHeight);

        // Symbol only - LARGE and centered
        ctx.font = 'bold 90px system-ui';
        ctx.fillStyle = crypto.color;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(crypto.symbol, x + cardWidth / 2, y + cardHeight / 2);
      });

      // Watermark
      ctx.font = '14px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
      ctx.textAlign = 'right';
      ctx.fillText('chainme.vercel.app', canvasWidth - 40, canvasHeight - 25);

      // Download
      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = `chainme-${name.toUpperCase()}.png`;
      link.click();
    }

    // Generate button handler
    document.getElementById('generateBtn').addEventListener('click', function() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name || name.length === 0) {
        alert('Please enter a name');
        return;
      }

      const container = document.getElementById('cardsContainer');
      container.innerHTML = '';
      document.getElementById('downloadSection').style.opacity = '0';
      document.getElementById('downloadSection').style.pointerEvents = 'none';

      const letters = name.toUpperCase().split('');
      letters.forEach((letter, index) => {
        if (CRYPTO_MAP[letter]) {
          createAndFlipCard(letter, index * 150);
        }
      });

      const lastFlipTime = (letters.filter(l => CRYPTO_MAP[l]).length - 1) * 150 + 600;
      setTimeout(() => {
        document.getElementById('downloadSection').style.opacity = '1';
        document.getElementById('downloadSection').style.pointerEvents = 'auto';
        createConfetti();
      }, lastFlipTime);
    });

    document.getElementById('nameInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        document.getElementById('generateBtn').click();
      }
    });

    document.getElementById('downloadBtn').addEventListener('click', function() {
      const name = document.getElementById('nameInput').value.trim();
      if (name) {
        downloadImage(name);
      }
    });

    document.getElementById('shareTwitterBtn').addEventListener('click', function() {
      const name = document.getElementById('nameInput').value.trim();
      if (name) {
        const text = encodeURIComponent(`I just created "${name}" with ChainMe 🪙 Try it: chainme.vercel.app`);
        window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
      }
    });

    document.getElementById('shareCopyBtn').addEventListener('click', function() {
      const name = document.getElementById('nameInput').value.trim();
      if (name) {
        const link = `${window.location.href}?chain=${encodeURIComponent(name)}`;
        navigator.clipboard.writeText(link).then(() => {
          alert('Link copied!');
        });
      }
    });

    document.getElementById('regenerateBtn').addEventListener('click', function() {
      document.getElementById('cardsContainer').innerHTML = '';
      document.getElementById('downloadSection').style.opacity = '0';
      document.getElementById('downloadSection').style.pointerEvents = 'none';
      document.getElementById('nameInput').value = '';
      document.getElementById('nameInput').focus();
    });

    function loadChainFromURL() {
      const params = new URLSearchParams(window.location.search);
      const chain = params.get('chain');
      if (chain) {
        document.getElementById('nameInput').value = chain;
        document.getElementById('generateBtn').click();
      }
    }

    window.addEventListener('load', () => {
      initializeFloatingSymbols();
      loadChainFromURL();
    });
  </script>
</body>
</html>
