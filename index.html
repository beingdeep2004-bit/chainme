<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChainMe — Crypto Portfolio Generator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Outfit', sans-serif;
      background: linear-gradient(135deg, #f5f5f7 0%, #e8e8ed 100%);
      overflow: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Subtle animated background gradient */
    .bg-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #ffffff 0%, #f5f5f7 50%, #ececf1 100%);
      z-index: 0;
      animation: bgShift 15s ease-in-out infinite;
    }

    @keyframes bgShift {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.02); }
    }

    /* Floating symbols - Apple GlassOS style */
    .floating-symbols {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .floating-symbol {
      position: absolute;
      opacity: 0;
      filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.08));
    }

    .floating-symbol svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    @keyframes burst {
      0% {
        transform: translate(0, 0) scale(0);
        opacity: 0.9;
      }
      100% {
        transform: translate(var(--tx), var(--ty)) scale(1);
        opacity: 0.08;
      }
    }

    .floating-symbol.burst-animation {
      animation: burst 1.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) translateZ(0); }
      50% { transform: translateY(-25px) translateZ(0); }
    }

    .floating-symbol.floating {
      animation: float 6s ease-in-out infinite;
      opacity: 0.06;
    }

    /* GlassOS Panel */
    .container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      width: 100%;
      max-width: 500px;
      padding: 20px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 28px;
      padding: 50px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06);
      opacity: 0;
      animation: fadeInPanel 0.8s ease-out 1.4s forwards;
    }

    @keyframes fadeInPanel {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .panel h1 {
      font-size: 2.2em;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
      color: #1d1d1f;
      letter-spacing: -0.5px;
    }

    .panel .tagline {
      text-align: center;
      color: #666;
      font-size: 0.95em;
      margin-bottom: 24px;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.03);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 12px;
      color: #1d1d1f;
      font-family: inherit;
      font-size: 0.95em;
      transition: all 0.3s ease;
      outline: none;
    }

    input[type="text"]:focus {
      background: rgba(0, 0, 0, 0.05);
      border-color: rgba(0, 0, 0, 0.12);
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
    }

    input[type="text"]::placeholder {
      color: rgba(0, 0, 0, 0.4);
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.3px;
    }

    .btn-generate {
      background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
      color: white;
      min-width: 140px;
      box-shadow: 0 8px 20px rgba(0, 102, 204, 0.2);
    }

    .btn-generate:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(0, 102, 204, 0.3);
    }

    .btn-generate:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: rgba(0, 0, 0, 0.06);
      color: #1d1d1f;
      border: 1px solid rgba(0, 0, 0, 0.08);
      width: 100%;
      margin-top: 12px;
    }

    .btn-secondary:hover {
      background: rgba(0, 0, 0, 0.09);
    }

    /* Cards container */
    .cards-container {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
      min-height: 130px;
      align-items: center;
    }

    .card {
      width: 75px;
      height: 100px;
      perspective: 1000px;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      font-weight: 600;
    }

    .card-front {
      background: rgba(0, 0, 0, 0.04);
      border: 1.5px solid rgba(0, 0, 0, 0.08);
      font-size: 2em;
      position: relative;
      overflow: hidden;
    }

    .card-front::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .card-back {
      transform: rotateY(180deg);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.3));
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      flex-direction: column;
      gap: 4px;
      padding: 8px;
      text-align: center;
      font-size: 0.6em;
    }

    .card-logo {
      font-size: 1.8em;
      line-height: 1;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-name {
      font-size: 0.75em;
      font-weight: 600;
      color: #1d1d1f;
      letter-spacing: 0.2px;
    }

    /* Download section */
    .download-section {
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.6s ease-out forwards;
    }

    .btn-download {
      background: linear-gradient(135deg, #34c759 0%, #2db84c 100%);
      color: white;
      margin-bottom: 12px;
      box-shadow: 0 8px 20px rgba(52, 199, 89, 0.2);
    }

    .btn-download:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(52, 199, 89, 0.3);
    }

    .share-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .share-buttons .btn-secondary {
      margin: 0;
      width: auto;
      min-width: 110px;
      font-size: 0.9em;
      padding: 10px 16px;
    }

    /* Confetti */
    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 5;
      border-radius: 50%;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Mobile responsive */
    @media (max-width: 768px) {
      .panel {
        padding: 35px 25px;
      }

      .panel h1 {
        font-size: 1.8em;
      }

      .card {
        width: 60px;
        height: 85px;
      }

      .card-logo {
        font-size: 1.4em;
      }
    }

    @media (max-width: 480px) {
      .panel {
        padding: 25px 15px;
      }

      .panel h1 {
        font-size: 1.5em;
      }

      .card {
        width: 50px;
        height: 75px;
      }

      .card-logo {
        font-size: 1.2em;
      }

      .input-group {
        flex-direction: column;
      }

      .btn-generate {
        width: 100%;
        min-width: unset;
      }
    }
  </style>
</head>
<body>
  <div class="bg-container"></div>
  <div class="floating-symbols"></div>

  <div class="container">
    <div class="panel">
      <h1>ChainMe</h1>
      <div class="tagline">Build Your Crypto Portfolio</div>

      <div class="input-group">
        <input type="text" id="nameInput" placeholder="Enter portfolio name..." autocomplete="off">
        <button class="btn btn-generate" id="generateBtn">Create</button>
      </div>

      <div class="cards-container" id="cardsContainer"></div>

      <div class="download-section" id="downloadSection">
        <button class="btn btn-secondary btn-download" id="downloadBtn">
          ↓ Download Portfolio
        </button>
        <div class="share-buttons">
          <button class="btn btn-secondary" id="shareTwitterBtn">Share</button>
          <button class="btn btn-secondary" id="shareCopyBtn">Copy</button>
          <button class="btn btn-secondary" id="regenerateBtn">Reset</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Crypto logos mapping with official colors
    const CRYPTO_MAP = {
      'B': { name: 'Bitcoin', symbol: '₿', color: '#F7931A' },
      'S': { name: 'Solana', symbol: '◎', color: '#14F195' },
      'E': { name: 'Ethereum', symbol: 'Ξ', color: '#627EEA' },
      'P': { name: 'Polymarket', symbol: '⬟', color: '#5294E2' },
      'K': { name: 'Kalshi', symbol: '◆', color: '#1E90FF' },
      'M': { name: 'MegaETH', symbol: '✦', color: '#6366F1' },
      'F': { name: 'FTX', symbol: '❌', color: '#E74C3C', strikethrough: true }
    };

    // SVG logo creators
    function createBTCLogo(size) {
      return `<svg viewBox="0 0 100 100" width="${size}" height="${size}" fill="none"><circle cx="50" cy="50" r="45" stroke="#F7931A" stroke-width="2"/><text x="50" y="65" font-size="50" fill="#F7931A" text-anchor="middle" font-weight="bold">₿</text></svg>`;
    }

    function createSOLLogo(size) {
      return `<svg viewBox="0 0 100 100" width="${size}" height="${size}" fill="none"><circle cx="50" cy="50" r="45" stroke="#14F195" stroke-width="2"/><text x="50" y="65" font-size="45" fill="#14F195" text-anchor="middle" font-weight="bold">◎</text></svg>`;
    }

    function createETHLogo(size) {
      return `<svg viewBox="0 0 100 100" width="${size}" height="${size}" fill="none"><circle cx="50" cy="50" r="45" stroke="#627EEA" stroke-width="2"/><text x="50" y="65" font-size="50" fill="#627EEA" text-anchor="middle" font-weight="bold">Ξ</text></svg>`;
    }

    function createPOLYLogo(size) {
      return `<svg viewBox="0 0 100 100" width="${size}" height="${size}" fill="none"><circle cx="50" cy="50" r="45" stroke="#5294E2" stroke-width="2"/><text x="50" y="65" font-size="45" fill="#5294E2" text-anchor="middle" font-weight="bold">⬟</text></svg>`;
    }

    function createKALSHILogo(size) {
      return `<svg viewBox="0 0 100 100" width="${size}" height="${size}" fill="none"><circle cx="50" cy="50" r="45" stroke="#1E90FF" stroke-width="2"/><text x="50" y="65" font-size="50" fill="#1E90FF" text-anchor="middle" font-weight="bold">◆</text></svg>`;
    }

    function createMEGAETHLogo(size) {
      return `<svg viewBox="0 0 100 100" width="${size}" height="${size}" fill="none"><circle cx="50" cy="50" r="45" stroke="#6366F1" stroke-width="2"/><text x="50" y="65" font-size="45" fill="#6366F1" text-anchor="middle" font-weight="bold">✦</text></svg>`;
    }

    function createFTXLogo(size) {
      return `<svg viewBox="0 0 100 100" width="${size}" height="${size}" fill="none"><circle cx="50" cy="50" r="45" stroke="#E74C3C" stroke-width="2"/><line x1="35" y1="35" x2="65" y2="65" stroke="#E74C3C" stroke-width="3"/><line x1="65" y1="35" x2="35" y2="65" stroke="#E74C3C" stroke-width="3"/><text x="50" y="68" font-size="45" fill="#E74C3C" text-anchor="middle" font-weight="bold">F</text></svg>`;
    }

    const logoCreators = {
      'B': createBTCLogo,
      'S': createSOLLogo,
      'E': createETHLogo,
      'P': createPOLYLogo,
      'K': createKALSHILogo,
      'M': createMEGAETHLogo,
      'F': createFTXLogo
    };

    // Initialize floating symbols
    function initializeFloatingSymbols() {
      const container = document.querySelector('.floating-symbols');
      const symbols = Object.keys(CRYPTO_MAP);
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;

      symbols.forEach((letter, index) => {
        const crypto = CRYPTO_MAP[letter];
        const symbol = document.createElement('div');
        symbol.className = 'floating-symbol burst-animation';

        const size = 80 + Math.random() * 40;
        symbol.style.width = size + 'px';
        symbol.style.height = size + 'px';
        symbol.style.left = centerX + 'px';
        symbol.style.top = centerY + 'px';

        const angle = (index / symbols.length) * Math.PI * 2;
        const distance = 250 + Math.random() * 350;
        const tx = Math.cos(angle) * distance + (Math.random() - 0.5) * 150;
        const ty = Math.sin(angle) * distance + (Math.random() - 0.5) * 150;

        symbol.style.setProperty('--tx', tx + 'px');
        symbol.style.setProperty('--ty', ty + 'px');

        const delay = Math.random() * 2;
        symbol.style.animationDelay = delay + 's';

        // Create SVG logo if available
        const logoCreator = logoCreators[letter];
        if (logoCreator) {
          symbol.innerHTML = logoCreator(size);
        } else {
          symbol.textContent = crypto.symbol;
          symbol.style.fontSize = (size * 0.6) + 'px';
          symbol.style.color = crypto.color;
          symbol.style.display = 'flex';
          symbol.style.alignItems = 'center';
          symbol.style.justifyContent = 'center';
        }

        container.appendChild(symbol);

        setTimeout(() => {
          symbol.classList.remove('burst-animation');
          symbol.classList.add('floating');
          symbol.style.animationDelay = delay + 's';
        }, 1400);
      });
    }

    // Play tick sound
    function playTickSound() {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const now = audioContext.currentTime;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();

      osc.connect(gain);
      gain.connect(audioContext.destination);

      osc.frequency.setValueAtTime(600, now);
      osc.frequency.exponentialRampToValueAtTime(300, now + 0.08);

      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);

      osc.start(now);
      osc.stop(now + 0.08);
    }

    // Create and flip card
    function createAndFlipCard(letter, delayMs) {
      const crypto = CRYPTO_MAP[letter.toUpperCase()];
      if (!crypto) return;

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-front"></div>
          <div class="card-back">
            <div class="card-logo">${crypto.symbol}</div>
            <div class="card-name">${crypto.name}</div>
          </div>
        </div>
      `;

      document.getElementById('cardsContainer').appendChild(card);

      setTimeout(() => {
        card.classList.add('flipped');
        playTickSound();
      }, delayMs);

      return card;
    }

    // Create confetti
    function createConfetti() {
      const colors = Object.values(CRYPTO_MAP).map(c => c.color);
      const confettiCount = 25;

      for (let i = 0; i < confettiCount; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * window.innerWidth + 'px';
        confetti.style.top = '-10px';
        confetti.style.width = '8px';
        confetti.style.height = '8px';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];

        document.body.appendChild(confetti);

        const duration = 2 + Math.random() * 1;
        const animation = confetti.animate([
          { transform: 'translateY(0) rotateZ(0deg)', opacity: 1 },
          { transform: `translateY(${window.innerHeight + 20}px) rotateZ(${Math.random() * 360}deg)`, opacity: 0 }
        ], {
          duration: duration * 1000,
          easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
        });

        animation.onfinish = () => confetti.remove();
      }
    }

    // Download image
    function downloadImage(name) {
      const letters = name.toUpperCase().split('');
      const cardWidth = 110;
      const cardHeight = 150;
      const padding = 60;
      const canvasWidth = Math.max(1200, letters.length * cardWidth + padding * 2);
      const canvasHeight = 500;

      const canvas = document.createElement('canvas');
      canvas.width = canvasWidth;
      canvas.height = canvasHeight;
      const ctx = canvas.getContext('2d');

      // Apple GlassOS background
      const bgGradient = ctx.createLinearGradient(0, 0, canvasWidth, canvasHeight);
      bgGradient.addColorStop(0, '#f5f5f7');
      bgGradient.addColorStop(0.5, '#ffffff');
      bgGradient.addColorStop(1, '#ececf1');
      ctx.fillStyle = bgGradient;
      ctx.fillRect(0, 0, canvasWidth, canvasHeight);

      // Subtle grid
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.03)';
      ctx.lineWidth = 1;
      for (let i = 0; i < canvasWidth; i += 50) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvasHeight);
        ctx.stroke();
      }

      // Watermark
      ctx.font = 'bold 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
      ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
      ctx.fillText('ChainMe', 40, 50);

      // Draw cards
      const startX = (canvasWidth - letters.length * cardWidth) / 2;
      const startY = (canvasHeight - cardHeight) / 2;

      letters.forEach((letter, index) => {
        const crypto = CRYPTO_MAP[letter];
        if (!crypto) return;

        const x = startX + index * cardWidth;
        const y = startY;

        // GlassOS card background
        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        ctx.fillRect(x + 8, y + 8, cardWidth - 16, cardHeight);

        ctx.strokeStyle = 'rgba(0, 0, 0, 0.08)';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x + 8, y + 8, cardWidth - 16, cardHeight);

        // Border radius via clipping
        ctx.save();
        ctx.beginPath();
        ctx.roundRect(x + 8, y + 8, cardWidth - 16, cardHeight, 16);
        ctx.clip();

        // Card styling
        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.fillRect(x + 8, y + 8, cardWidth - 16, cardHeight);

        ctx.restore();

        // Symbol
        ctx.font = 'bold 60px system-ui';
        ctx.fillStyle = crypto.color;
        ctx.textAlign = 'center';
        ctx.fillText(crypto.symbol, x + cardWidth / 2, y + 60);

        // Name
        ctx.font = '600 14px -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.fillStyle = '#1d1d1f';
        ctx.fillText(crypto.name, x + cardWidth / 2, y + 120);

        // Letter
        ctx.font = 'bold 24px system-ui';
        ctx.fillStyle = crypto.color;
        ctx.fillText(letter, x + cardWidth / 2, y + 145);
      });

      // Bottom watermark
      ctx.font = '12px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.textAlign = 'right';
      ctx.fillText('chainme.vercel.app', canvasWidth - 40, canvasHeight - 20);

      // Download
      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = `chainme-${name.toUpperCase()}.png`;
      link.click();
    }

    // Generate button handler
    document.getElementById('generateBtn').addEventListener('click', function() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name || name.length === 0) {
        alert('Please enter a portfolio name');
        return;
      }

      const container = document.getElementById('cardsContainer');
      container.innerHTML = '';
      document.getElementById('downloadSection').style.opacity = '0';
      document.getElementById('downloadSection').style.pointerEvents = 'none';

      const letters = name.toUpperCase().split('');
      letters.forEach((letter, index) => {
        if (CRYPTO_MAP[letter]) {
          createAndFlipCard(letter, index * 130);
        }
      });

      const lastFlipTime = (letters.length - 1) * 130 + 500;
      setTimeout(() => {
        document.getElementById('downloadSection').style.opacity = '1';
        document.getElementById('downloadSection').style.pointerEvents = 'auto';
        createConfetti();
      }, lastFlipTime);
    });

    document.getElementById('nameInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        document.getElementById('generateBtn').click();
      }
    });

    document.getElementById('downloadBtn').addEventListener('click', function() {
      const name = document.getElementById('nameInput').value.trim();
      if (name) {
        downloadImage(name);
      }
    });

    document.getElementById('shareTwitterBtn').addEventListener('click', function() {
      const name = document.getElementById('nameInput').value.trim();
      if (name) {
        const text = encodeURIComponent(`I just created a crypto portfolio with ChainMe: ${name} 🚀 Try it → chainme.vercel.app`);
        window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
      }
    });

    document.getElementById('shareCopyBtn').addEventListener('click', function() {
      const name = document.getElementById('nameInput').value.trim();
      if (name) {
        const link = `${window.location.href}?portfolio=${encodeURIComponent(name)}`;
        navigator.clipboard.writeText(link).then(() => {
          alert('Portfolio link copied!');
        });
      }
    });

    document.getElementById('regenerateBtn').addEventListener('click', function() {
      document.getElementById('cardsContainer').innerHTML = '';
      document.getElementById('downloadSection').style.opacity = '0';
      document.getElementById('downloadSection').style.pointerEvents = 'none';
      document.getElementById('nameInput').focus();
    });

    function loadPortfolioFromURL() {
      const params = new URLSearchParams(window.location.search);
      const portfolio = params.get('portfolio');
      if (portfolio) {
        document.getElementById('nameInput').value = portfolio;
        document.getElementById('generateBtn').click();
      }
    }

    window.addEventListener('load', () => {
      initializeFloatingSymbols();
      loadPortfolioFromURL();
    });
  </script>
</body>
</html>
